receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 2s
    limit_mib: 512
  batch:
  resourcedetection:
    detectors: [system]
    override: false

exporters:
  # Traces via OTLP (raw span storage for APM Trace Analyzer)
  otlphttp:
    traces_endpoint: "https://ingest.us1.signalfx.com/v2/trace/otlp"
    headers:
      "X-SF-Token": "${SPLUNK_ACCESS_TOKEN}"

  # SignalFx exporter — handles APM correlation AND AI trace indexing.
  # send_otlp_histograms: true is required for AI Agent Monitoring pages.
  signalfx:
    access_token: "${SPLUNK_ACCESS_TOKEN}"
    realm: "${SPLUNK_REALM}"
    correlation:
    send_otlp_histograms: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch, resourcedetection]
      exporters: [otlphttp, signalfx]  # signalfx correlation is what populates AI Trace Data
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [signalfx]
